<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Table Tennis</title>
  <style>
    :root {
      --ink: #f6f7f2;
      --muted: rgba(246, 247, 242, 0.68);
      --line: rgba(246, 247, 242, 0.16);
      --table: #9f1f26;
      --table-dark: #5f1018;
      --accent: #d7b46a;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(255, 255, 255, 0.14);
      --danger: #ff7a66;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 8%, rgba(215, 180, 106, 0.18), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(255, 91, 91, 0.14), transparent 30%),
        linear-gradient(145deg, #17080a, #250d11 52%, #120609);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand span {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 760;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      line-height: 0.94;
      letter-spacing: -0.07em;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, auto);
      align-items: center;
      gap: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
    }

    .score-card {
      min-width: 82px;
      padding: 7px 12px;
      text-align: center;
    }

    .score-card span {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 760;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-card strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .score-divider {
      width: 1px;
      height: 42px;
      background: var(--line);
    }

    .stage {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(246, 247, 242, 0.2);
      border-radius: 28px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(180deg, var(--table), var(--table-dark));
      box-shadow: 0 36px 90px rgba(0, 0, 0, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(340px, 560px) minmax(220px, 280px);
      gap: 16px;
      align-items: start;
      justify-content: center;
    }

    canvas {
      width: 100%;
      aspect-ratio: 5 / 6;
      display: block;
      cursor: none;
    }

    .status {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      padding: 9px 14px;
      border: 1px solid rgba(246, 247, 242, 0.18);
      border-radius: 999px;
      background: rgba(7, 20, 18, 0.54);
      color: var(--ink);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      font-size: 0.92rem;
      font-weight: 720;
      letter-spacing: -0.02em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .controls {
      display: grid;
      gap: 14px;
      align-items: start;
      position: sticky;
      top: 18px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
    }

    .hints {
      display: grid;
      gap: 8px;
    }

    .hint,
    button,
    select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 680;
      letter-spacing: -0.01em;
    }

    .hint {
      display: inline-flex;
      align-items: center;
      padding: 0 13px;
      color: var(--muted);
    }

    .actions {
      display: grid;
      gap: 8px;
      align-items: center;
      justify-content: stretch;
    }

    button,
    select {
      padding: 0 14px;
      appearance: none;
      cursor: pointer;
      width: 100%;
    }

    button:hover,
    button:focus-visible,
    select:hover,
    select:focus-visible {
      background: var(--surface-strong);
      outline: none;
    }

    .primary {
      border-color: rgba(215, 180, 106, 0.42);
      background: rgba(215, 180, 106, 0.18);
      color: #fff8df;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .topbar,
      .game-layout {
        grid-template-columns: 1fr;
        display: grid;
      }

      .scoreboard,
      .actions {
        justify-self: stretch;
        justify-content: center;
      }

      .scoreboard {
        grid-template-columns: 1fr auto 1fr;
      }

      .stage {
        border-radius: 20px;
      }

      canvas {
        aspect-ratio: 5 / 7;
      }

      .hints {
        justify-content: stretch;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span>Arcade match</span>
        <h1>Table Tennis</h1>
      </div>

      <section class="scoreboard" aria-label="Scoreboard">
        <div class="score-card">
          <span>You</span>
          <strong id="playerScore">0</strong>
        </div>
        <div class="score-divider" aria-hidden="true"></div>
        <div class="score-card">
          <span>Computer</span>
          <strong id="computerScore">0</strong>
        </div>
      </section>
    </header>

    <div class="game-layout">
      <section class="stage" aria-label="Table tennis game area">
        <div id="status" class="status">Computer serves first</div>
        <canvas id="game" width="1280" height="720" aria-label="Playable table tennis game"></canvas>
      </section>

      <section class="controls" aria-label="Game controls">
        <div class="hints">
        <span class="hint">Move: Mouse, touch, ←/→, A/D</span>
        <span class="hint">W: forehand</span>
        <span class="hint">W twice: smash</span>
        <span class="hint">S: backhand</span>
        <span class="hint">S twice: spin</span>
          <span class="hint">Pause: Space</span>
          <span class="hint">First to 7 wins</span>
        </div>

        <div class="actions">
          <select id="difficulty" aria-label="Difficulty">
            <option value="0.075">Easy</option>
            <option value="0.105" selected>Normal</option>
            <option value="0.138">Hard</option>
          </select>
          <select id="speed" aria-label="Ball speed">
            <option value="1">Speed 1</option>
            <option value="2">Speed 2</option>
            <option value="3">Speed 3</option>
            <option value="4">Speed 4</option>
            <option value="5" selected>Speed 5</option>
            <option value="6">Speed 6</option>
            <option value="7">Speed 7</option>
            <option value="8">Speed 8</option>
            <option value="9">Speed 9</option>
            <option value="10">Speed 10</option>
          </select>
          <button type="button" id="reset">Reset</button>
          <button type="button" id="serve" class="primary">Serve</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const playerScoreEl = document.getElementById('playerScore');
    const computerScoreEl = document.getElementById('computerScore');
    const statusEl = document.getElementById('status');
    const serveButton = document.getElementById('serve');
    const resetButton = document.getElementById('reset');
    const difficultyEl = document.getElementById('difficulty');
    const speedEl = document.getElementById('speed');

    const state = {
      running: false,
      gameOver: false,
      playerScore: 0,
      computerScore: 0,
      keys: new Set(),
      aiSpeed: Number(difficultyEl.value),
      speedLevel: Number(speedEl.value),
      nextServer: 'computer',
      player: { x: 0, y: 0, w: 128, h: 16, targetX: 0, lastX: 0, swing: 0 },
      computer: { x: 0, y: 0, w: 128, h: 16, lastX: 0 },
      ball: { x: 0, y: 0, z: 0, r: 10, vx: 0, vy: 0, vz: 0, spin: 0, speed: 7.5, lastY: 0 }
    };
    let queuedShot = null;
    let lastForehandTap = 0;
    let lastBackhandTap = 0;

    function fitCanvas() {
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * scale);
      canvas.height = Math.round(rect.height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      resetPositions(false);
    }

    function width() {
      return canvas.getBoundingClientRect().width;
    }

    function height() {
      return canvas.getBoundingClientRect().height;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function resetPositions(centerPlayer = true) {
      const w = width();
      const h = height();
      state.player.w = Math.max(86, w * 0.24);
      state.player.h = 16;
      state.player.x = centerPlayer ? (w - state.player.w) / 2 : clamp(state.player.x, 16, w - state.player.w - 16);
      state.player.y = h - state.player.h - 28;
      state.player.targetX = state.player.x;
      state.player.lastX = state.player.x;

      state.computer.w = state.player.w;
      state.computer.h = state.player.h;
      state.computer.x = centerPlayer ? (w - state.computer.w) / 2 : clamp(state.computer.x, 16, w - state.computer.w - 16);
      state.computer.y = 28;
      state.computer.lastX = state.computer.x;

      state.ball.x = w / 2;
      state.ball.y = h / 2;
      state.ball.z = 0;
      state.ball.vz = 0;
      state.ball.spin = 0;
      state.ball.lastY = state.ball.y;
      state.ball.r = Math.max(8, Math.min(12, w * 0.012));
      draw();
    }

    function serve(direction = state.nextServer === 'player' ? -1 : 1) {
      if (state.gameOver) resetGame();
      state.running = true;
      state.ball.x = width() / 2;
      state.ball.y = state.nextServer === 'player' ? state.player.y - state.ball.r - 4 : state.computer.y + state.computer.h + state.ball.r + 4;
      state.ball.z = 10;
      state.ball.speed = Math.max(6.8, width() * 0.008) * getSpeedMultiplier();
      state.ball.vx = (Math.random() * 2 - 1) * state.ball.speed * 0.58;
      state.ball.vy = direction * state.ball.speed;
      state.ball.vz = 3.8;
      state.ball.spin = 0;
      statusEl.textContent = state.nextServer === 'player' ? 'Your serve' : 'Computer serve';
    }

    function resetGame() {
      state.running = false;
      state.gameOver = false;
      state.playerScore = 0;
      state.computerScore = 0;
      state.nextServer = 'computer';
      playerScoreEl.textContent = '0';
      computerScoreEl.textContent = '0';
      resetPositions(true);
      statusEl.textContent = 'Computer serves first';
    }

    function score(pointForPlayer) {
      state.running = false;
      if (pointForPlayer) {
        state.playerScore += 1;
        state.nextServer = 'player';
        playerScoreEl.textContent = state.playerScore;
      } else {
        state.computerScore += 1;
        state.nextServer = 'computer';
        computerScoreEl.textContent = state.computerScore;
      }

      if (state.playerScore >= 7 || state.computerScore >= 7) {
        state.gameOver = true;
        statusEl.textContent = state.playerScore > state.computerScore ? 'You win. Reset for another match.' : 'Computer wins. Reset for another match.';
      } else {
        statusEl.textContent = pointForPlayer ? 'Point to you. Your serve.' : 'Point to computer. Computer serves.';
      }

      resetPositions(false);
    }

    function movePlayer() {
      const w = width();
      const speed = w * 0.02;

      if (state.keys.has('arrowleft') || state.keys.has('a')) {
        state.player.targetX -= speed;
      }
      if (state.keys.has('arrowright') || state.keys.has('d')) {
        state.player.targetX += speed;
      }

      state.player.lastX = state.player.x;
      state.player.targetX = clamp(state.player.targetX, 16, w - state.player.w - 16);
      state.player.x += (state.player.targetX - state.player.x) * 0.34;
      state.player.swing = state.player.x - state.player.lastX;
    }

    function moveComputer() {
      const w = width();
      const paddleCenter = state.computer.x + state.computer.w / 2;
      const prediction = state.ball.x + state.ball.vx * 8;
      const target = clamp(prediction, state.computer.w / 2 + 16, w - state.computer.w / 2 - 16);
      state.computer.lastX = state.computer.x;
      state.computer.x += (target - paddleCenter) * state.aiSpeed;
      state.computer.x = clamp(state.computer.x, 16, w - state.computer.w - 16);
    }

    function hitPaddle(paddle, side) {
      const ball = state.ball;
      const withinX = ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w;
      const withinY = side === 'bottom'
        ? ball.y + ball.r > paddle.y && ball.y < paddle.y + paddle.h
        : ball.y - ball.r < paddle.y + paddle.h && ball.y > paddle.y;

      if (!withinX || !withinY) return;

      const relative = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const isPlayer = side === 'bottom';
      const shot = isPlayer ? queuedShot : null;
      const paddleSwing = isPlayer ? state.player.swing : state.computer.x - state.computer.lastX;
      const shotPower = shot === 'smash' ? 1.42 : shot === 'forehand' ? 1.2 : shot === 'spin' ? 1.12 : shot === 'backhand' ? 1.05 : 1;
      const shotAngle = shot === 'smash' ? 0.62 : shot === 'forehand' ? 1.18 : shot === 'spin' ? -1.55 : shot === 'backhand' ? -1.18 : 0.92;

      const speedMultiplier = getSpeedMultiplier();
      ball.speed = Math.min((ball.speed + 0.38 * speedMultiplier) * shotPower, width() * 0.018 * speedMultiplier);
      if (shot === 'smash') {
        const usualServeSpeed = Math.max(6.8, width() * 0.008) * speedMultiplier;
        ball.speed = Math.max(ball.speed, usualServeSpeed * 2);
      }
      ball.vy = (isPlayer ? -1 : 1) * ball.speed;
      ball.vx = relative * ball.speed * shotAngle + paddleSwing * 0.18;
      ball.vz = shot === 'smash' ? 2.2 : shot === 'spin' ? 4.7 : 3.6;
      ball.spin = shot === 'spin' ? (relative >= 0 ? -0.13 : 0.13) : shot === 'backhand' ? -0.055 : shot === 'forehand' ? 0.055 : 0;
      if (shot === 'spin') {
        ball.vx += relative >= 0 ? -ball.speed * 0.72 : ball.speed * 0.72;
      }
      ball.y = side === 'bottom' ? paddle.y - ball.r : paddle.y + paddle.h + ball.r;

      if (isPlayer && queuedShot) {
        statusEl.textContent = queuedShot === 'smash' ? 'Smash' : queuedShot === 'forehand' ? 'Forehand drive' : queuedShot === 'spin' ? 'Backhand spin' : 'Backhand return';
        queuedShot = null;
      }
    }

    function update() {
      if (!state.running) return;

      const w = width();
      const h = height();
      const ball = state.ball;

      movePlayer();
      moveComputer();

      ball.lastY = ball.y;
      ball.vx += ball.spin;
      ball.x += ball.vx;
      ball.y += ball.vy;
      ball.z += ball.vz;
      ball.vz -= 0.22;

      if (ball.z < 0) {
        ball.z = 0;
        ball.vz = Math.abs(ball.vz) * 0.58;
        ball.vx *= 0.985;
        ball.vy *= 0.985;
      }

      hitPaddle(state.player, 'bottom');
      hitPaddle(state.computer, 'top');

      if (ball.x - ball.r <= 10 || ball.x + ball.r >= w - 10) {
        ball.vx *= -1;
        ball.x = clamp(ball.x, 10 + ball.r, w - 10 - ball.r);
      }

      if (ball.y < -ball.r) score(true);
      if (ball.y > h + ball.r) score(false);

      if (ball.y < -ball.r) score(true);
      if (ball.y > h + ball.r) score(false);
    }

    function drawTable(w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#9f1f26';
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(246,247,242,0.48)';
      ctx.lineWidth = 2;
      ctx.strokeRect(14, 14, w - 28, h - 28);

      ctx.setLineDash([12, 16]);
      ctx.beginPath();
      ctx.moveTo(14, h / 2);
      ctx.lineTo(w - 14, h / 2);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = 'rgba(246,247,242,0.18)';
      ctx.beginPath();
      ctx.moveTo(w / 2, 14);
      ctx.lineTo(w / 2, h - 14);
      ctx.stroke();

      const netY = h / 2;
      ctx.strokeStyle = 'rgba(255,255,255,0.72)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(18, netY);
      ctx.lineTo(w - 18, netY);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1;
      for (let x = 24; x < w - 24; x += 16) {
        ctx.beginPath();
        ctx.moveTo(x, netY - 7);
        ctx.lineTo(x + 8, netY + 7);
        ctx.stroke();
      }
    }

    function getSpeedMultiplier() {
      return 0.65 + (state.speedLevel - 1) * 0.095;
    }

    function drawRacket(paddle, side) {
      const faceW = Math.max(68, paddle.w * 0.62);
      const faceH = faceW * 1.12;
      const cx = paddle.x + paddle.w / 2;
      const cy = side === 'bottom' ? paddle.y - faceH * 0.26 : paddle.y + paddle.h + faceH * 0.26;
      const handleW = faceW * 0.26;
      const handleH = faceH * 0.68;
      const handleX = cx - handleW / 2;
      const handleY = side === 'bottom' ? cy + faceH * 0.34 : cy - faceH * 0.34 - handleH;
      const playerForehand = side === 'bottom' && (queuedShot === 'forehand' || queuedShot === 'smash');
      const playerBackhand = side === 'bottom' && (queuedShot === 'backhand' || queuedShot === 'spin');
      const rim = side === 'bottom' ? '#2a2624' : '#30291f';
      const rubber = playerForehand ? '#111417' : playerBackhand ? '#df3f34' : '#111417';
      const rubberAccent = side === 'bottom' ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.14)';

      ctx.save();

      const handleGradient = ctx.createLinearGradient(handleX, handleY, handleX + handleW, handleY);
      handleGradient.addColorStop(0, '#6f4127');
      handleGradient.addColorStop(0.5, '#c4864d');
      handleGradient.addColorStop(1, '#6f4127');
      ctx.fillStyle = handleGradient;
      roundRect(handleX, handleY, handleW, handleH, handleW * 0.45);
      ctx.fill();

      ctx.fillStyle = 'rgba(45,30,20,0.35)';
      const bandCount = 3;
      for (let i = 1; i <= bandCount; i += 1) {
        const bandY = handleY + (handleH / (bandCount + 1)) * i;
        roundRect(handleX + 2, bandY, handleW - 4, 3, 999);
        ctx.fill();
      }

      ctx.beginPath();
      ctx.ellipse(cx, cy, faceW / 2, faceH / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = rim;
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(cx, cy, faceW * 0.43, faceH * 0.43, 0, 0, Math.PI * 2);
      ctx.fillStyle = rubber;
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(cx - faceW * 0.12, cy - faceH * 0.16, faceW * 0.16, faceH * 0.1, -0.55, 0, Math.PI * 2);
      ctx.fillStyle = rubberAccent;
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.32)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, faceW * 0.43, faceH * 0.43, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    }

    function roundRect(x, y, w, h, radius) {
      const r = Math.min(radius, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function draw() {
      const w = width();
      const h = height();
      drawTable(w, h);
      drawRacket(state.player, 'bottom');
      drawRacket(state.computer, 'top');

      const shadowScale = 1 + state.ball.z / 80;
      ctx.beginPath();
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.ellipse(state.ball.x, state.ball.y + state.ball.z * 0.32, state.ball.r * 1.35 * shadowScale, state.ball.r * 0.48, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(255,255,255,0.55)';
      ctx.shadowBlur = 16;
      ctx.arc(state.ball.x, state.ball.y - state.ball.z, state.ball.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function pointerToPaddle(event) {
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      state.player.targetX = clamp(x - state.player.w / 2, 16, width() - state.player.w - 16);
    }

    window.addEventListener('resize', fitCanvas);
    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      state.keys.add(key);
      if (key === 'w') {
        const now = performance.now();
        if (now - lastForehandTap < 330) {
          queuedShot = 'smash';
          statusEl.textContent = 'Smash ready';
          lastForehandTap = 0;
        } else {
          queuedShot = 'forehand';
          statusEl.textContent = 'Forehand ready';
          lastForehandTap = now;
        }
      }
      if (key === 's') {
        const now = performance.now();
        if (now - lastBackhandTap < 330) {
          queuedShot = 'spin';
          statusEl.textContent = 'Spin ready';
          lastBackhandTap = 0;
        } else {
          queuedShot = 'backhand';
          statusEl.textContent = 'Backhand ready';
          lastBackhandTap = now;
        }
      }
      if (key === ' ') {
        event.preventDefault();
        if (state.running) {
          state.running = false;
          statusEl.textContent = 'Paused';
        } else {
          serve();
        }
      }
    });
    window.addEventListener('keyup', (event) => state.keys.delete(event.key.toLowerCase()));
    canvas.addEventListener('pointermove', pointerToPaddle);
    canvas.addEventListener('pointerdown', (event) => {
      pointerToPaddle(event);
      if (!state.running) serve();
    });
    serveButton.addEventListener('click', () => serve());
    resetButton.addEventListener('click', resetGame);
    difficultyEl.addEventListener('change', () => {
      state.aiSpeed = Number(difficultyEl.value);
    });
    speedEl.addEventListener('change', () => {
      state.speedLevel = Number(speedEl.value);
      if (!state.running) {
        statusEl.textContent = `Speed ${state.speedLevel} selected. Serve when ready.`;
      }
    });

    fitCanvas();
    loop();
  </script>
</body>
</html>
